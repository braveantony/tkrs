apiVersion: kubeadm.k8s.io/v1beta4
kind: InitConfiguration
localAPIEndpoint:
  # change from Master node IP
  advertiseAddress: $SRVIP
  bindPort: 6443
nodeRegistration:
  # change from CRI-O Unix Socket
  criSocket: unix:///run/containerd/containerd.sock         
  imagePullPolicy: IfNotPresent
  # change from Master node hsotname
  name: $cn-control-plane-1
  taints: null
---
apiVersion: kubeadm.k8s.io/v1beta4
kind: ClusterConfiguration
certificatesDir: /etc/kubernetes/pki
# set your clusterName
clusterName: $cn
apiServer:
  extraArgs:
    - name: audit-log-format
      value: legacy        # text
    - name: audit-policy-file
      value: /opt/zfs/logs/apiserver/audit-policy.yaml
    - name: audit-log-path
      value: /opt/zfs/logs/apiserver/audit.log
    # Retain logs for 3 days
    - name: audit-log-maxage
      value: "3"
    # Retain 5 old log files
    - name: audit-log-maxbackup
      value: "5"
    # Rotate after 10MB
    - name: audit-log-maxsize
      value: "10"
  extraVolumes:
    # Mount the Log Directory (Read-Write)
    # This allows the API server to write logs effectively to the host disk
    - name: audit-logs
      hostPath: /opt/zfs
      mountPath: /opt/zfs
      readOnly: false
      pathType: DirectoryOrCreate
    - name: host-localtime
      hostPath: /etc/localtime
      mountPath: /etc/localtime
      readOnly: true
      pathType: File
controllerManager:
  extraArgs:
    # 每個節點分配的 Pod CIDR 大小（/25 = 每節點最多 128 個 Pod IP）
    - name: node-cidr-mask-size              
      value: "25"
    # 垃圾回收：已終止 Pod 保留上限，超過此數量會觸發清理
    - name: terminated-pod-gc-threshold
      value: "500"
    # 節點失聯後，標記為 NotReady 前的寬限時間
    - name: node-monitor-grace-period
      value: "50s"
    # Controller Manager 檢查節點狀態的間隔
    - name: node-monitor-period
      value: "5s"
etcd:
  local:
    dataDir: /var/lib/etcd
    extraArgs:
      # Performance Tuning (Crucial for high latency networks)
      - name: heartbeat-interval
        value: "250"     # Default 100ms. Bump if network is jittery.
      - name: election-timeout
        value: "2500"      # Default 1000ms. 10x heartbeat is standard.
      # Snapshot/Storage
      - name: quota-backend-bytes
        value: "8589934592" # 8GB. Default is 2GB (often too small for prod).
      - name: auto-compaction-retention
        value: "3"    # Auto compact every 3 hour.
scheduler:
  extraArgs:
    # Security: Disable profiling to reduce attack surface
    - name: profiling
      value: "false"
    # Logging: Standard verbosity
    - name: v
      value: "2"
    # Networking: Ensure it binds only to localhost
    - name: bind-address
      value: "127.0.0.1"
dns: {}
imageRepository: registry.k8s.io
kubernetesVersion: $KVER
caCertificateValidityPeriod: 43800h0m0s      # 5 years
certificateValidityPeriod: 8760h0m0s         # 1 years
controlPlaneEndpoint: "$KUBEVIP:6443"
networking:
  dnsDomain: $cn.k8s                                    # DNS domain used by Kubernetes Services.
  podSubnet: ${PNID}                             # the subnet used by Pods.
  serviceSubnet: ${SNID}                           # subnet used by Kubernetes Services.
proxy:
  disabled: true
---
apiVersion: kubelet.config.k8s.io/v1beta1
kind: KubeletConfiguration
maxPods: 60    # 如果要調大，要注意 pod cidr per node, 和 os 的 kernel.pid_max
# podLogsDir: /opt/zfs/logs

# Container Log Management
containerLogMaxFiles: 3           # Default: 5
containerLogMaxSize: 1Mi          # Default: "10Mi"

# Image Garbage Collection (每 5 分鐘檢查,依最久未使用順序刪除)
imageGCHighThresholdPercent: 85   # imagefs 使用率 >=85% 時觸發 GC     # Default: 85
imageGCLowThresholdPercent: 80    # imagefs 使用率降至 <=80% 時停止 GC # Default: 80
imageMinimumGCAge: "2m"           # image 存在未滿此時間不會被 GC       # Default: "2m"
imageMaximumGCAge: "0s"           # image 閒置超過此時間強制 GC         # Default: "0s" (disabled)

# Node Status Update Frequency
nodeStatusUpdateFrequency: "10s"    # 計算 node status 的頻率          # Default: "10s"
nodeStatusReportFrequency: "5m"     # status 無變化時強制上報 API server 的最大間隔,有變化會立即上報 # Default: "5m"

# Configuring graceful node shutdown
#For example, if ShutdownGracePeriod=30s, and ShutdownGracePeriodCriticalPods=10s, 
#kubelet will delay the node shutdown by 30 seconds. During this time, 
#the first 20 seconds (30-10) would be reserved for gracefully terminating normal pods, 
#and the last 10 seconds would be reserved for terminating critical pods.
shutdownGracePeriod: 60s
shutdownGracePeriodCriticalPods: 30s

# Allocatable = Capacity − kubeReserved − systemReserved − evictionHard
# 觸發條件達到時立即驅逐 Pod(節點最後防線)
#evictionHard:
#  memory.available: "1024Mi"
#  nodefs.available: "10%"

# 預留給 K8s 元件(kubelet、container runtime)
#kubeReserved:
#  cpu: "500m"
#  memory: "1Gi"

# 預留給 OS 服務(sshd、udev ...等)
#systemReserved:
#  cpu: "1"
#  memory: "1Gi"
#  ephemeral-storage: "10Gi"

# 對應的 cgroup 路徑(systemd driver 必須以 / 開頭、.slice 結尾)
# 官方建議 kubeReservedCgroup 用 /runtime.slice(需自建); kind 環境可用 /kubelet.slice
# cgroup 必須事先存在,否則 kubelet 啟動失敗
#kubeReservedCgroup: "/kubelet.slice"
#systemReservedCgroup: "/system.slice"

# 啟用哪些 cgroup 強制限制(預設只有 pods)
# 注意:list 內用 kebab-case,跟欄位名 camelCase 不同
#enforceNodeAllocatable:
#  - pods
#  - kube-reserved
#  - system-reserved